<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>坪數計算機</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  min-height: 100vh;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
.app { display: flex; flex-direction: column; height: 100vh; }
.header {
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; z-index: 10;
}
.header h1 { font-size: 18px; font-weight: 600; }
.mode-badge {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.4); color: #a5b4fc;
}
.mode-badge.scale { background: rgba(251,191,36,0.2); border-color: rgba(251,191,36,0.4); color: #fcd34d; }
.toolbar {
  padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  background: #0a0a1a; border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; z-index: 10; position: sticky; top: 0;
}
.btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 13px; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.btn:hover { background: rgba(255,255,255,0.12); }
.btn:active { transform: scale(0.97); }
.btn.primary { background: rgba(99,102,241,0.3); border-color: rgba(99,102,241,0.5); color: #c7d2fe; }
.btn.danger { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #fca5a5; }
.btn.active { background: rgba(34,197,94,0.25); border-color: rgba(34,197,94,0.5); color: #86efac; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.main-area { display: flex; flex: 1; overflow: hidden; position: relative; }
.canvas-wrap {
  flex: 1; position: relative; overflow: hidden; cursor: crosshair;
  background: #050510;
}
.canvas-wrap.panning { cursor: grab; }
.canvas-wrap.panning:active { cursor: grabbing; }
#dropzone {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 5;
  border: 2px dashed rgba(99,102,241,0.4); border-radius: 12px; margin: 20px;
  background: rgba(99,102,241,0.05); cursor: pointer; transition: all 0.2s;
}
#dropzone:hover { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.6); }
#dropzone.hidden { display: none; }
#dropzone .icon { font-size: 48px; margin-bottom: 12px; }
#dropzone .text { font-size: 16px; color: #a5b4fc; }
#dropzone .sub { font-size: 13px; color: #6b7280; margin-top: 6px; }
#fileInput { display: none; }
canvas { position: absolute; top: 0; left: 0; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
.canvas-wrap { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
.sidebar {
  width: 280px; flex-shrink: 0; overflow-y: auto;
  background: rgba(255,255,255,0.02); border-left: 1px solid rgba(255,255,255,0.08);
  display: flex; flex-direction: column; z-index: 10;
}
.sidebar-header { padding: 12px 16px; font-size: 14px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.06); }
.room-list { flex: 1; overflow-y: auto; padding: 8px; }
.room-item {
  padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.06); transition: all 0.15s;
  display: flex; justify-content: space-between; align-items: center;
}
.room-item:hover { background: rgba(255,255,255,0.05); }
.room-item.selected { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.1); }
.room-info { flex: 1; }
.room-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.room-color { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.room-area { font-size: 12px; color: #9ca3af; margin-top: 2px; }
.room-delete {
  width: 28px; height: 28px; border-radius: 6px; border: none; cursor: pointer;
  background: rgba(239,68,68,0.15); color: #f87171; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.room-delete:hover { background: rgba(239,68,68,0.3); }
.total-bar {
  padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}
.total-label { font-size: 12px; color: #9ca3af; }
.total-value { font-size: 18px; font-weight: 700; color: #a5b4fc; margin-top: 2px; }
.total-sub { font-size: 12px; color: #6b7280; }
.instructions {
  padding: 8px 16px; font-size: 12px; color: #6b7280;
  background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; z-index: 10;
}
/* Scale input modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  padding: 24px; min-width: 300px; max-width: 90vw;
}
.modal h3 { font-size: 16px; margin-bottom: 16px; }
.modal label { font-size: 13px; color: #9ca3af; display: block; margin-bottom: 4px; }
.modal input, .modal select {
  width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06); color: #e0e0e0; font-size: 16px; margin-bottom: 12px;
  -webkit-user-select: text; user-select: text;
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

/* Mobile */
@media (max-width: 768px) {
  .sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: 260px; transform: translateX(100%); transition: transform 0.3s; z-index: 50; background: #0a0a1a; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 49; display: none; }
  .sidebar-overlay.show { display: block; }
  .header h1 { font-size: 15px; }
  .btn { font-size: 12px; padding: 5px 10px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📐 坪數計算機</h1>
    <div class="mode-badge" id="modeBadge">上傳圖片</div>
  </div>
  <div class="instructions" id="instructions">拖曳或點擊上傳平面圖開始使用</div>
  <div class="toolbar">
    <button class="btn" id="btnUpload" title="上傳圖片">📁 上傳</button>
    <button class="btn" id="btnScale" disabled title="設定比例尺">📏 比例尺</button>
    <button class="btn primary" id="btnDraw" disabled title="繪製房間">✏️ 繪製</button>
    <button class="btn" id="btnPan" disabled title="平移模式">🖐️ 平移</button>
    <button class="btn" id="btnUndo" disabled title="復原 (Ctrl+Z)">↩ 復原</button>
    <button class="btn" id="btnRedo" disabled title="重做 (Ctrl+Shift+Z)">↪ 重做</button>
    <button class="btn danger" id="btnClearAll" disabled>🗑️ 清除全部</button>
    <button class="btn" id="btnExport" disabled title="輸出圖片">📷 輸出圖片</button>
    <span style="flex:1"></span>
    <button class="btn" id="btnRoomList">📋 房間列表</button>
  </div>
  <div class="main-area">
    <div class="canvas-wrap" id="canvasWrap">
      <div id="dropzone">
        <div class="icon">📐</div>
        <div class="text">上傳平面圖</div>
        <div class="sub">拖曳圖片至此處，或點擊選擇檔案</div>
      </div>
      <input type="file" id="fileInput" accept="image/*">
      <canvas id="canvas"></canvas>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">房間列表</div>
      <div class="room-list" id="roomList"></div>
      <div class="total-bar">
        <div class="total-label">總面積</div>
        <div class="total-value" id="totalPing">0 坪</div>
        <div class="total-sub" id="totalM2">0 m²</div>
      </div>
    </div>
  </div>
</div>

<!-- Scale Modal -->
<div class="modal-overlay hidden" id="scaleModal">
  <div class="modal">
    <h3>📏 設定比例尺</h3>
    <p style="font-size:13px;color:#9ca3af;margin-bottom:16px;">請輸入兩點之間的實際距離</p>
    <label>距離</label>
    <input type="number" id="scaleDistance" step="any" min="0" placeholder="例如: 300">
    <label>單位</label>
    <select id="scaleUnit">
      <option value="cm">公分 (cm)</option>
      <option value="m">公尺 (m)</option>
    </select>
    <div class="modal-actions">
      <button class="btn" id="scaleCancelBtn">取消</button>
      <button class="btn primary" id="scaleConfirmBtn">確定</button>
    </div>
  </div>
</div>

<!-- Room Name Modal -->
<div class="modal-overlay hidden" id="roomModal">
  <div class="modal">
    <h3>🏠 命名房間</h3>
    <label>房間名稱</label>
    <input type="text" id="roomNameInput" placeholder="例如: 客廳、主臥">
    <div class="modal-actions">
      <button class="btn" id="roomCancelBtn">取消</button>
      <button class="btn primary" id="roomConfirmBtn">確定</button>
    </div>
  </div>
</div>

<script>
(function() {
'use strict';

const PING_PER_M2 = 1 / 3.30579;
const ROOM_COLORS = [
  '#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6',
  '#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16',
  '#e879f9','#22d3ee','#a3e635','#fb923c','#c084fc'
];

let state = {
  image: null,
  imageW: 0, imageH: 0,
  mode: 'idle', // idle, scale, draw, pan
  scale: null, // { pixelsPerMeter }
  scalePoints: [],
  rooms: [],
  currentPoly: [],
  selectedRoom: -1,
  // transform
  offsetX: 0, offsetY: 0, zoom: 1,
  // drag & preview
  cursorPos: null, // { x, y } in screen coords, for preview point
  draggingPoint: null, // { type: 'current'|'room', roomIndex, pointIndex }
  hoveredPoint: null, // { type, roomIndex, pointIndex } for highlight
  pointerDownTime: 0, // timestamp for long-press detection
  dragStarted: false, // true once drag threshold met after long-press
  // magnifier for touch
  magnifier: { active: false, screenX: 0, screenY: 0, imageX: 0, imageY: 0 }
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const modeBadge = document.getElementById('modeBadge');
const instrEl = document.getElementById('instructions');
const roomListEl = document.getElementById('roomList');
const totalPingEl = document.getElementById('totalPing');
const totalM2El = document.getElementById('totalM2');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

const btnUpload = document.getElementById('btnUpload');
const btnScale = document.getElementById('btnScale');
const btnDraw = document.getElementById('btnDraw');
const btnPan = document.getElementById('btnPan');
const btnUndo = document.getElementById('btnUndo');
const btnRedo = document.getElementById('btnRedo');
const btnClearAll = document.getElementById('btnClearAll');
const btnExport = document.getElementById('btnExport');
const btnRoomList = document.getElementById('btnRoomList');

const scaleModal = document.getElementById('scaleModal');
const scaleDistance = document.getElementById('scaleDistance');
const scaleUnit = document.getElementById('scaleUnit');
const scaleCancelBtn = document.getElementById('scaleCancelBtn');
const scaleConfirmBtn = document.getElementById('scaleConfirmBtn');

const roomModal = document.getElementById('roomModal');
const roomNameInput = document.getElementById('roomNameInput');
const roomCancelBtn = document.getElementById('roomCancelBtn');
const roomConfirmBtn = document.getElementById('roomConfirmBtn');

let img = null;
let isPanning = false;
let panStart = { x: 0, y: 0 };
let lastPinchDist = 0;
let pendingPolyPoints = null;

// --- Undo/Redo system ---
const MAX_UNDO = 50;
let undoStack = [];
let redoStack = [];

function captureSnapshot() {
  return {
    rooms: JSON.parse(JSON.stringify(state.rooms)),
    currentPoly: JSON.parse(JSON.stringify(state.currentPoly)),
    scalePoints: JSON.parse(JSON.stringify(state.scalePoints)),
    scale: state.scale ? JSON.parse(JSON.stringify(state.scale)) : null,
    selectedRoom: state.selectedRoom
  };
}

function applySnapshot(snap) {
  state.rooms = JSON.parse(JSON.stringify(snap.rooms));
  state.currentPoly = JSON.parse(JSON.stringify(snap.currentPoly));
  state.scalePoints = JSON.parse(JSON.stringify(snap.scalePoints));
  state.scale = snap.scale ? JSON.parse(JSON.stringify(snap.scale)) : null;
  state.selectedRoom = snap.selectedRoom;
}

function pushUndo() {
  undoStack.push(captureSnapshot());
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
  updateUndoRedoButtons();
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(captureSnapshot());
  applySnapshot(undoStack.pop());
  updateUndoRedoButtons();
  recalcAreas();
  updateRoomList();
  saveState();
  render();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(captureSnapshot());
  applySnapshot(redoStack.pop());
  updateUndoRedoButtons();
  recalcAreas();
  updateRoomList();
  saveState();
  render();
}

function updateUndoRedoButtons() {
  btnUndo.disabled = undoStack.length === 0;
  btnRedo.disabled = redoStack.length === 0;
}

function resizeCanvas() {
  const r = window.devicePixelRatio || 1;
  canvas.width = wrap.clientWidth * r;
  canvas.height = wrap.clientHeight * r;
  canvas.style.width = wrap.clientWidth + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  ctx.setTransform(r, 0, 0, r, 0, 0);
  render();
}

function setMode(m) {
  state.mode = m;
  state.cursorPos = null;
  state.hoveredPoint = null;
  state.draggingPoint = null;
  state.dragStarted = false;
  wrap.classList.toggle('panning', m === 'pan');
  btnScale.classList.toggle('active', m === 'scale');
  btnDraw.classList.toggle('active', m === 'draw');
  btnPan.classList.toggle('active', m === 'pan');
  const labels = { idle: '就緒', scale: '設定比例尺', draw: '繪製房間', pan: '平移' };
  modeBadge.textContent = labels[m] || m;
  modeBadge.classList.toggle('scale', m === 'scale');
  const instrs = {
    idle: '選擇工具開始操作',
    scale: '在圖上點擊兩個已知距離的端點',
    draw: '點擊放置頂點，拖曳已放置的頂點可調整位置，點擊第一個點或按 Enter 閉合',
    pan: '拖曳平移畫面，滾輪縮放'
  };
  instrEl.textContent = instrs[m] || '';
  updateUndoRedoButtons();
}

// --- Image loading ---
function loadImage(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    img = new Image();
    img.onload = function() {
      state.imageW = img.naturalWidth;
      state.imageH = img.naturalHeight;
      state.image = e.target.result;
      dropzone.classList.add('hidden');
      // fit image
      const ww = wrap.clientWidth, wh = wrap.clientHeight;
      const s = Math.min(ww / img.naturalWidth, wh / img.naturalHeight, 1);
      state.zoom = s;
      state.offsetX = (ww - img.naturalWidth * s) / 2;
      state.offsetY = (wh - img.naturalHeight * s) / 2;
      btnScale.disabled = false;
      btnDraw.disabled = false;
      btnPan.disabled = false;
      btnClearAll.disabled = false;
      btnExport.disabled = false;
      setMode('scale');
      instrEl.textContent = '請先設定比例尺：點擊圖上兩個已知距離的端點';
      saveState();
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function loadImageFromDataURL(dataURL) {
  img = new Image();
  img.onload = function() {
    state.imageW = img.naturalWidth;
    state.imageH = img.naturalHeight;
    dropzone.classList.add('hidden');
    btnScale.disabled = false;
    btnDraw.disabled = false;
    btnPan.disabled = false;
    btnClearAll.disabled = false;
    btnExport.disabled = false;
    if (!state.scale) setMode('scale');
    else setMode('draw');
    render();
  };
  img.src = dataURL;
}

// --- Coordinate transforms ---
function screenToImage(sx, sy) {
  return { x: (sx - state.offsetX) / state.zoom, y: (sy - state.offsetY) / state.zoom };
}
function imageToScreen(ix, iy) {
  return { x: ix * state.zoom + state.offsetX, y: iy * state.zoom + state.offsetY };
}

// --- Polygon area (Shoelace) ---
function polygonArea(pts) {
  let a = 0;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    a += pts[i].x * pts[j].y;
    a -= pts[j].x * pts[i].y;
  }
  return Math.abs(a) / 2;
}

function polygonCentroid(pts) {
  let cx = 0, cy = 0;
  for (const p of pts) { cx += p.x; cy += p.y; }
  return { x: cx / pts.length, y: cy / pts.length };
}

function dist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }

// --- Point hit detection ---
const HIT_RADIUS = 15; // screen pixels
function findNearPoint(sx, sy) {
  // Check current polygon points first
  for (let i = 0; i < state.currentPoly.length; i++) {
    const s = imageToScreen(state.currentPoly[i].x, state.currentPoly[i].y);
    if (dist({ x: sx, y: sy }, s) < HIT_RADIUS) {
      return { type: 'current', roomIndex: -1, pointIndex: i };
    }
  }
  // Check completed room points
  for (let ri = 0; ri < state.rooms.length; ri++) {
    const pts = state.rooms[ri].points;
    for (let pi = 0; pi < pts.length; pi++) {
      const s = imageToScreen(pts[pi].x, pts[pi].y);
      if (dist({ x: sx, y: sy }, s) < HIT_RADIUS) {
        return { type: 'room', roomIndex: ri, pointIndex: pi };
      }
    }
  }
  return null;
}

function recalcRoom(room) {
  room.pixelArea = polygonArea(room.points);
  if (state.scale) {
    room.areaM2 = room.pixelArea / (state.scale.pixelsPerMeter ** 2);
    room.areaPing = room.areaM2 * PING_PER_M2;
  }
}

// --- Rendering ---
function render() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  ctx.clearRect(0, 0, w, h);
  if (!img) return;

  ctx.save();
  ctx.translate(state.offsetX, state.offsetY);
  ctx.scale(state.zoom, state.zoom);
  ctx.drawImage(img, 0, 0);
  ctx.restore();

  // Draw completed rooms
  state.rooms.forEach((room, ri) => {
    const color = ROOM_COLORS[ri % ROOM_COLORS.length];
    drawPoly(room.points, color, ri === state.selectedRoom, room.name, room);
  });

  // Draw scale points
  if (state.mode === 'scale') {
    const color = '#fcd34d';
    state.scalePoints.forEach(p => {
      const s = imageToScreen(p.x, p.y);
      drawDot(s.x, s.y, 6, color);
    });
    // Line between two placed points
    if (state.scalePoints.length === 2) {
      const a = imageToScreen(state.scalePoints[0].x, state.scalePoints[0].y);
      const b = imageToScreen(state.scalePoints[1].x, state.scalePoints[1].y);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      ctx.setLineDash([]);
      const pd = dist(state.scalePoints[0], state.scalePoints[1]);
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      ctx.fillStyle = '#fcd34d';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      if (state.scale) {
        const realM = pd / state.scale.pixelsPerMeter;
        ctx.fillText(realM.toFixed(2) + ' m', mx, my - 8);
      } else {
        ctx.fillText(Math.round(pd) + ' px', mx, my - 8);
      }
    }
    // Preview line from last placed point to cursor
    if (state.scalePoints.length === 1 && state.cursorPos) {
      const a = imageToScreen(state.scalePoints[0].x, state.scalePoints[0].y);
      ctx.strokeStyle = 'rgba(252,211,77,0.5)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(state.cursorPos.x, state.cursorPos.y); ctx.stroke();
      ctx.setLineDash([]);
    }
    // Preview cursor dot in scale mode
    if (state.scalePoints.length < 2 && state.cursorPos) {
      const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
      ctx.fillStyle = `rgba(252,211,77,${pulse * 0.6})`;
      ctx.beginPath(); ctx.arc(state.cursorPos.x, state.cursorPos.y, 8, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = `rgba(252,211,77,${pulse})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // Scale indicator
  if (state.scale) {
    ctx.fillStyle = 'rgba(34,197,94,0.8)';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('✓ 比例尺已設定 (' + state.scale.pixelsPerMeter.toFixed(1) + ' px/m)', 10, h - 10);
  }

  // Draw current polygon
  if (state.currentPoly.length > 0) {
    const color = ROOM_COLORS[state.rooms.length % ROOM_COLORS.length];
    const pts = state.currentPoly;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < pts.length; i++) {
      const s = imageToScreen(pts[i].x, pts[i].y);
      if (i === 0) ctx.moveTo(s.x, s.y);
      else ctx.lineTo(s.x, s.y);
    }
    ctx.stroke();

    // Draw distance labels along edges
    if (state.scale) {
      ctx.fillStyle = color;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      for (let i = 1; i < pts.length; i++) {
        const a = imageToScreen(pts[i-1].x, pts[i-1].y);
        const b = imageToScreen(pts[i].x, pts[i].y);
        const d = dist(pts[i-1], pts[i]) / state.scale.pixelsPerMeter;
        const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
        ctx.fillText(d.toFixed(2) + 'm', mx, my - 6);
      }
    }

    pts.forEach((p, i) => {
      const s = imageToScreen(p.x, p.y);
      drawDot(s.x, s.y, i === 0 ? 7 : 5, color);
    });

    // Highlight first point if closeable
    if (pts.length >= 3) {
      const s = imageToScreen(pts[0].x, pts[0].y);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 10, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Draw preview point and lines when in draw mode
  if (state.mode === 'draw' && state.cursorPos && !state.draggingPoint) {
    const cp = state.cursorPos;
    const color = ROOM_COLORS[state.rooms.length % ROOM_COLORS.length];
    // Preview line from last placed point to cursor
    if (state.currentPoly.length > 0) {
      const last = imageToScreen(state.currentPoly[state.currentPoly.length - 1].x, state.currentPoly[state.currentPoly.length - 1].y);
      ctx.strokeStyle = hexToRgba(color, 0.4);
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(cp.x, cp.y); ctx.stroke();
      ctx.setLineDash([]);
      // Preview line from cursor to first point (shows potential close)
      if (state.currentPoly.length >= 2) {
        const first = imageToScreen(state.currentPoly[0].x, state.currentPoly[0].y);
        ctx.strokeStyle = hexToRgba(color, 0.2);
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 5]);
        ctx.beginPath(); ctx.moveTo(cp.x, cp.y); ctx.lineTo(first.x, first.y); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    // Preview dot (pulsing via alpha animation)
    const pulse = 0.4 + 0.3 * Math.sin(Date.now() / 200);
    ctx.fillStyle = hexToRgba(color, pulse);
    ctx.beginPath(); ctx.arc(cp.x, cp.y, 6, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = hexToRgba('#ffffff', pulse);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Highlight hovered point
  if (state.hoveredPoint && !state.draggingPoint) {
    let hp = null;
    if (state.hoveredPoint.type === 'current' && state.hoveredPoint.pointIndex < state.currentPoly.length) {
      hp = imageToScreen(state.currentPoly[state.hoveredPoint.pointIndex].x, state.currentPoly[state.hoveredPoint.pointIndex].y);
    } else if (state.hoveredPoint.type === 'room' && state.hoveredPoint.roomIndex < state.rooms.length) {
      const rp = state.rooms[state.hoveredPoint.roomIndex].points[state.hoveredPoint.pointIndex];
      if (rp) hp = imageToScreen(rp.x, rp.y);
    }
    if (hp) {
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(hp.x, hp.y, 10, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath(); ctx.arc(hp.x, hp.y, 10, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Highlight dragging point
  if (state.draggingPoint) {
    let dp = null;
    if (state.draggingPoint.type === 'current' && state.draggingPoint.pointIndex < state.currentPoly.length) {
      dp = imageToScreen(state.currentPoly[state.draggingPoint.pointIndex].x, state.currentPoly[state.draggingPoint.pointIndex].y);
    } else if (state.draggingPoint.type === 'room' && state.draggingPoint.roomIndex < state.rooms.length) {
      const rp = state.rooms[state.draggingPoint.roomIndex].points[state.draggingPoint.pointIndex];
      if (rp) dp = imageToScreen(rp.x, rp.y);
    }
    if (dp) {
      ctx.strokeStyle = '#fcd34d';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(dp.x, dp.y, 12, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = 'rgba(252,211,77,0.3)';
      ctx.beginPath(); ctx.arc(dp.x, dp.y, 12, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Draw magnifier for touch interaction
  if (state.magnifier.active && img) {
    drawMagnifier();
  }
}

function drawMagnifier() {
  const mag = state.magnifier;
  const RADIUS = 60; // 120px diameter
  const ZOOM = 2.5;
  const OFFSET_Y = 100; // pixels above touch point

  // Determine magnifier center position (above finger, or below if near top)
  let magCenterX = mag.screenX;
  let magCenterY = mag.screenY - OFFSET_Y;
  if (magCenterY - RADIUS < 0) {
    // Too close to top edge, show below finger instead
    magCenterY = mag.screenY + OFFSET_Y;
  }

  const w = wrap.clientWidth, h = wrap.clientHeight;

  ctx.save();

  // Draw the magnifier circle with clipping
  ctx.beginPath();
  ctx.arc(magCenterX, magCenterY, RADIUS, 0, Math.PI * 2);
  ctx.clip();

  // Fill with dark background first (for areas outside image)
  ctx.fillStyle = '#111';
  ctx.fillRect(magCenterX - RADIUS, magCenterY - RADIUS, RADIUS * 2, RADIUS * 2);

  // Calculate source region in screen coords centered on the touch point
  // We want to show a region of size (RADIUS*2/ZOOM) around the touch point, magnified to fill the circle
  const srcSize = RADIUS * 2 / ZOOM; // screen pixels to capture around touch

  // Draw the image portion magnified
  // Map from image coords: the touch point is at (mag.imageX, mag.imageY) in image space
  // In the magnifier, we want to render the scene around the touch point at ZOOM magnification
  // We re-draw the image with adjusted transform so the touch point maps to magCenter
  ctx.save();
  ctx.beginPath();
  ctx.arc(magCenterX, magCenterY, RADIUS, 0, Math.PI * 2);
  ctx.clip();

  // Set up transform: translate so that imageToScreen(mag.imageX, mag.imageY) = (magCenterX, magCenterY) but at ZOOM * state.zoom
  const magZoom = state.zoom * ZOOM;
  const magOffsetX = magCenterX - mag.imageX * magZoom;
  const magOffsetY = magCenterY - mag.imageY * magZoom;

  // Draw the floor plan image
  ctx.translate(magOffsetX, magOffsetY);
  ctx.scale(magZoom, magZoom);
  ctx.drawImage(img, 0, 0);
  ctx.restore();

  // Re-draw room polygons and points inside the magnifier with magnified transform
  ctx.save();
  ctx.beginPath();
  ctx.arc(magCenterX, magCenterY, RADIUS, 0, Math.PI * 2);
  ctx.clip();

  // Helper: convert image coords to magnifier screen coords
  function magImgToScreen(ix, iy) {
    return { x: ix * magZoom + magOffsetX, y: iy * magZoom + magOffsetY };
  }

  // Draw completed rooms in magnifier
  state.rooms.forEach((room, ri) => {
    if (room.points.length < 3) return;
    const color = ROOM_COLORS[ri % ROOM_COLORS.length];
    const screenPts = room.points.map(p => magImgToScreen(p.x, p.y));
    // Fill
    ctx.fillStyle = hexToRgba(color, ri === state.selectedRoom ? 0.35 : 0.18);
    ctx.beginPath();
    screenPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath(); ctx.fill();
    // Stroke
    ctx.strokeStyle = ri === state.selectedRoom ? '#fff' : color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    screenPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath(); ctx.stroke();
    // Dots
    screenPts.forEach(p => {
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    });
  });

  // Draw current polygon in magnifier
  if (state.currentPoly.length > 0) {
    const color = ROOM_COLORS[state.rooms.length % ROOM_COLORS.length];
    const pts = state.currentPoly;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < pts.length; i++) {
      const s = magImgToScreen(pts[i].x, pts[i].y);
      if (i === 0) ctx.moveTo(s.x, s.y);
      else ctx.lineTo(s.x, s.y);
    }
    ctx.stroke();
    pts.forEach((p, i) => {
      const s = magImgToScreen(p.x, p.y);
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(s.x, s.y, i === 0 ? 7 : 5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    });
  }

  // Draw scale points in magnifier
  if (state.mode === 'scale') {
    state.scalePoints.forEach(p => {
      const s = magImgToScreen(p.x, p.y);
      ctx.fillStyle = '#fcd34d';
      ctx.beginPath(); ctx.arc(s.x, s.y, 6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    });
  }

  ctx.restore();

  ctx.restore();

  // Draw magnifier border and crosshair (outside clip)
  ctx.save();
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(magCenterX, magCenterY, RADIUS, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Red crosshair in the center
  const crossSize = 8;
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(magCenterX - crossSize, magCenterY);
  ctx.lineTo(magCenterX + crossSize, magCenterY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(magCenterX, magCenterY - crossSize);
  ctx.lineTo(magCenterX, magCenterY + crossSize);
  ctx.stroke();

  // Small dot at crosshair center
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  ctx.arc(magCenterX, magCenterY, 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawDot(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawPoly(pts, color, selected, name, room) {
  if (pts.length < 3) return;
  const screenPts = pts.map(p => imageToScreen(p.x, p.y));

  // Fill
  ctx.fillStyle = hexToRgba(color, selected ? 0.35 : 0.18);
  ctx.beginPath();
  screenPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.closePath(); ctx.fill();

  // Stroke
  ctx.strokeStyle = selected ? '#fff' : color;
  ctx.lineWidth = selected ? 3 : 2;
  ctx.beginPath();
  screenPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.closePath(); ctx.stroke();

  // Dots
  screenPts.forEach(p => drawDot(p.x, p.y, 4, color));

  // Edge distances
  if (state.scale) {
    ctx.fillStyle = color;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    for (let i = 0; i < pts.length; i++) {
      const j = (i + 1) % pts.length;
      const a = screenPts[i], b = screenPts[j];
      const d = dist(pts[i], pts[j]) / state.scale.pixelsPerMeter;
      const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
      // background
      const text = d.toFixed(2) + 'm';
      const tw = ctx.measureText(text).width;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(mx - tw/2 - 3, my - 16, tw + 6, 16);
      ctx.fillStyle = color;
      ctx.fillText(text, mx, my - 4);
    }
  }

  // Label
  const c = polygonCentroid(pts);
  const sc = imageToScreen(c.x, c.y);
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px sans-serif';
  // bg
  let areaText = name || '';
  if (state.scale && room) {
    const areaM2 = room.areaM2;
    const areaPing = room.areaPing;
    areaText += '\n' + areaM2.toFixed(2) + ' m²\n' + areaPing.toFixed(2) + ' 坪';
  }
  const lines = areaText.split('\n');
  const lh = 16;
  const totalH = lines.length * lh;
  // bg rect
  let maxW = 0;
  lines.forEach(l => { maxW = Math.max(maxW, ctx.measureText(l).width); });
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(sc.x - maxW/2 - 6, sc.y - totalH/2 - 4, maxW + 12, totalH + 8);
  ctx.fillStyle = '#fff';
  lines.forEach((l, i) => {
    ctx.font = i === 0 ? 'bold 13px sans-serif' : '12px sans-serif';
    ctx.fillText(l, sc.x, sc.y - totalH/2 + lh * (i + 0.7));
  });
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// --- Interaction ---
function getEventPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  if (e.changedTouches && e.changedTouches.length > 0) {
    return { x: e.changedTouches[0].clientX - rect.left, y: e.changedTouches[0].clientY - rect.top };
  }
  if (e.clientX !== undefined) {
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  return null;
}

function handleClick(sx, sy) {
  const imgP = screenToImage(sx, sy);
  // Check bounds
  if (imgP.x < 0 || imgP.y < 0 || imgP.x > state.imageW || imgP.y > state.imageH) return;

  if (state.mode === 'scale') {
    if (state.scalePoints.length < 2) {
      pushUndo();
      state.scalePoints.push(imgP);
      render();
      if (state.scalePoints.length === 2) {
        // Both points placed — show distance input modal after a brief delay
        setTimeout(() => {
          scaleModal.classList.remove('hidden');
          scaleDistance.value = '';
          scaleDistance.focus();
        }, 200);
      }
    }
  } else if (state.mode === 'draw') {
    // Check if clicking near first point to close
    if (state.currentPoly.length >= 3) {
      const first = imageToScreen(state.currentPoly[0].x, state.currentPoly[0].y);
      if (dist({ x: sx, y: sy }, first) < 15) {
        closePoly();
        return;
      }
    }
    pushUndo();
    state.currentPoly.push(imgP);
    render();
  }
}

let lastClickTime = 0;
function handleDblClick(sx, sy) {
  if (state.mode === 'draw' && state.currentPoly.length >= 3) {
    // Remove the extra point added by single click that preceded dblclick
    if (state.currentPoly.length > 3) state.currentPoly.pop();
    closePoly();
  }
}

function closePoly() {
  if (state.currentPoly.length < 3) return;
  pushUndo();
  pendingPolyPoints = [...state.currentPoly];
  state.currentPoly = [];
  // Show room name modal
  roomModal.classList.remove('hidden');
  roomNameInput.value = '';
  const defaultNames = ['客廳','主臥','次臥','廚房','浴室','書房','陽台','餐廳','走廊','儲藏室'];
  roomNameInput.placeholder = defaultNames[state.rooms.length % defaultNames.length] || '房間';
  roomNameInput.focus();
}

function finalizeRoom(name) {
  if (!pendingPolyPoints) return;
  const pts = pendingPolyPoints;
  pendingPolyPoints = null;
  const pixelArea = polygonArea(pts);
  let areaM2 = 0, areaPing = 0;
  if (state.scale) {
    areaM2 = pixelArea / (state.scale.pixelsPerMeter ** 2);
    areaPing = areaM2 * PING_PER_M2;
  }
  state.rooms.push({ name: name || '房間', points: pts, areaM2, areaPing, pixelArea });
  updateRoomList();
  saveState();
  render();
}

function recalcAreas() {
  if (!state.scale) return;
  state.rooms.forEach(r => {
    r.areaM2 = r.pixelArea / (state.scale.pixelsPerMeter ** 2);
    r.areaPing = r.areaM2 * PING_PER_M2;
  });
}

// --- Room list ---
function updateRoomList() {
  roomListEl.innerHTML = '';
  let totalM2 = 0, totalPing = 0;
  state.rooms.forEach((r, i) => {
    totalM2 += r.areaM2;
    totalPing += r.areaPing;
    const div = document.createElement('div');
    div.className = 'room-item' + (i === state.selectedRoom ? ' selected' : '');
    const color = ROOM_COLORS[i % ROOM_COLORS.length];
    div.innerHTML = `
      <div class="room-info">
        <div class="room-name"><span class="room-color" style="background:${color}"></span>${escHtml(r.name)}</div>
        <div class="room-area">${r.areaM2.toFixed(2)} m² / ${r.areaPing.toFixed(2)} 坪</div>
      </div>
      <button class="room-delete" data-i="${i}" title="刪除">✕</button>
    `;
    div.addEventListener('click', (e) => {
      if (e.target.closest('.room-delete')) {
        pushUndo();
        state.rooms.splice(i, 1);
        if (state.selectedRoom >= state.rooms.length) state.selectedRoom = -1;
        updateRoomList();
        saveState();
        render();
        return;
      }
      state.selectedRoom = (state.selectedRoom === i) ? -1 : i;
      updateRoomList();
      render();
    });
    roomListEl.appendChild(div);
  });
  totalPingEl.textContent = totalPing.toFixed(2) + ' 坪';
  totalM2El.textContent = totalM2.toFixed(2) + ' m²';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Zoom/Pan ---
function handleWheel(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoomAt(mx, my, delta);
}

function zoomAt(sx, sy, factor) {
  const newZoom = Math.max(0.05, Math.min(20, state.zoom * factor));
  const ratio = newZoom / state.zoom;
  state.offsetX = sx - ratio * (sx - state.offsetX);
  state.offsetY = sy - ratio * (sy - state.offsetY);
  state.zoom = newZoom;
  render();
}

// --- Events ---
let mouseDown = false;
let mouseDownPos = null;
let hasMoved = false;
let lastTouchTime = 0; // Prevent duplicate mouse events after touch

let longPressTimer = null;

function onPointerDown(e) {
  // Skip mouse events that fire after touch events (prevents double points)
  if (!e.touches && Date.now() - lastTouchTime < 500) return;
  if (e.touches) lastTouchTime = Date.now();
  if (e.touches && e.touches.length === 2) {
    state.magnifier.active = false;
    lastPinchDist = dist(
      { x: e.touches[0].clientX, y: e.touches[0].clientY },
      { x: e.touches[1].clientX, y: e.touches[1].clientY }
    );
    return;
  }
  const pos = getEventPos(e);
  mouseDown = true;
  mouseDownPos = pos;
  hasMoved = false;
  state.pointerDownTime = Date.now();
  state.dragStarted = false;

  // Activate magnifier on single-finger touch in scale/draw modes
  if (e.touches && e.touches.length === 1 && (state.mode === 'scale' || state.mode === 'draw') && img) {
    const imgP = screenToImage(pos.x, pos.y);
    state.magnifier = { active: true, screenX: pos.x, screenY: pos.y, imageX: imgP.x, imageY: imgP.y };
  }

  if (state.mode === 'pan') {
    isPanning = true;
    panStart = { x: pos.x - state.offsetX, y: pos.y - state.offsetY };
  } else if (state.mode === 'draw') {
    // Check if pointer is near an existing point (for drag)
    const nearPt = findNearPoint(pos.x, pos.y);
    if (nearPt) {
      // Don't drag the first point if polygon is closeable -- clicking it should close
      const isCloseClick = nearPt.type === 'current' && nearPt.pointIndex === 0 && state.currentPoly.length >= 3;
      if (!isCloseClick) {
        // For mouse: start drag immediately on existing points
        // For touch: use long-press (300ms) to distinguish tap vs drag
        if (!e.touches) {
          pushUndo();
          state.draggingPoint = nearPt;
          state.dragStarted = true;
        } else {
          // Touch: set up long-press timer
          longPressTimer = setTimeout(() => {
            const np = findNearPoint(pos.x, pos.y);
            if (np && mouseDown && !hasMoved) {
              pushUndo();
              state.draggingPoint = np;
              state.dragStarted = true;
              render();
            }
          }, 300);
        }
      }
    }
  }
}

function onPointerMove(e) {
  if (!e.touches && Date.now() - lastTouchTime < 500) return;
  if (e.touches && e.touches.length === 2) {
    e.preventDefault();
    const d = dist(
      { x: e.touches[0].clientX, y: e.touches[0].clientY },
      { x: e.touches[1].clientX, y: e.touches[1].clientY }
    );
    if (lastPinchDist > 0) {
      const rect = canvas.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
      zoomAt(cx, cy, d / lastPinchDist);
    }
    lastPinchDist = d;
    return;
  }

  const pos = getEventPos(e);

  // Update cursor position for preview (draw and scale modes)
  if ((state.mode === 'draw' || state.mode === 'scale') && img) {
    state.cursorPos = pos;
    if (state.mode === 'draw') state.hoveredPoint = findNearPoint(pos.x, pos.y);
    startAnimIfNeeded();
    // During touch (finger down), update magnifier and render preview at finger position
    if (mouseDown && !state.draggingPoint && !isPanning && e.touches) {
      if (e.touches.length === 1) {
        const imgP = screenToImage(pos.x, pos.y);
        state.magnifier = { active: true, screenX: pos.x, screenY: pos.y, imageX: imgP.x, imageY: imgP.y };
      }
      render();
    }
  }

  if (!mouseDown) {
    return;
  }

  if (Math.abs(pos.x - mouseDownPos.x) > 3 || Math.abs(pos.y - mouseDownPos.y) > 3) {
    hasMoved = true;
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  }

  // Handle dragging a point
  if (state.draggingPoint && state.dragStarted) {
    const imgP = screenToImage(pos.x, pos.y);
    // Clamp to image bounds
    imgP.x = Math.max(0, Math.min(state.imageW, imgP.x));
    imgP.y = Math.max(0, Math.min(state.imageH, imgP.y));
    if (state.draggingPoint.type === 'current') {
      state.currentPoly[state.draggingPoint.pointIndex] = imgP;
    } else if (state.draggingPoint.type === 'room') {
      state.rooms[state.draggingPoint.roomIndex].points[state.draggingPoint.pointIndex] = imgP;
    }
    render();
    return;
  }

  if (state.mode === 'pan' && isPanning) {
    state.offsetX = pos.x - panStart.x;
    state.offsetY = pos.y - panStart.y;
    render();
  } else if (hasMoved && (e.buttons === 4 || e.buttons === 2 || (e.buttons === 1 && e.shiftKey))) {
    // Middle button or shift+left to pan in any mode
    if (!isPanning) {
      isPanning = true;
      panStart = { x: pos.x - state.offsetX, y: pos.y - state.offsetY };
    }
    state.offsetX = pos.x - panStart.x;
    state.offsetY = pos.y - panStart.y;
    render();
  }
}

function onPointerUp(e) {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  if (e.changedTouches && e.changedTouches.length > 0) {
    lastPinchDist = 0;
  }
  // Deactivate magnifier
  state.magnifier.active = false;
  const wasPanning = isPanning;
  const wasDragging = state.draggingPoint && state.dragStarted;
  isPanning = false;

  // Finalize drag
  if (wasDragging) {
    if (state.draggingPoint.type === 'room') {
      recalcRoom(state.rooms[state.draggingPoint.roomIndex]);
      updateRoomList();
    }
    saveState();
    state.draggingPoint = null;
    state.dragStarted = false;
    mouseDown = false;
    mouseDownPos = null;
    render();
    return;
  }

  state.draggingPoint = null;
  state.dragStarted = false;

  if (mouseDown && !wasPanning && img) {
    // Use release position — fallback chain: touchend pos → last cursor pos → press pos
    const pos = getEventPos(e) || state.cursorPos || mouseDownPos;
    if (pos) handleClick(pos.x, pos.y);
  }
  mouseDown = false;
  mouseDownPos = null;
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', () => { state.cursorPos = null; state.hoveredPoint = null; render(); });
canvas.addEventListener('touchstart', (e) => {
  // Only prevent default for multi-touch (pinch zoom) or when in pan mode
  if (e.touches.length >= 2 || state.mode === 'pan') e.preventDefault();
  onPointerDown(e);
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  // Always prevent default on move to avoid page scroll while drawing
  if (mouseDown || (e.touches && e.touches.length >= 2)) e.preventDefault();
  onPointerMove(e);
}, { passive: false });
canvas.addEventListener('touchend', (e) => { onPointerUp(e); }, { passive: false });
canvas.addEventListener('wheel', handleWheel, { passive: false });
canvas.addEventListener('dblclick', (e) => {
  const rect = canvas.getBoundingClientRect();
  handleDblClick(e.clientX - rect.left, e.clientY - rect.top);
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
wrap.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('contextmenu', e => { if (e.target.tagName !== 'INPUT') e.preventDefault(); });

// --- Dropzone ---
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); dropzone.style.borderColor = 'rgba(99,102,241,0.8)'; });
dropzone.addEventListener('dragleave', e => { e.preventDefault(); dropzone.style.borderColor = ''; });
dropzone.addEventListener('drop', e => {
  e.preventDefault(); e.stopPropagation(); dropzone.style.borderColor = '';
  if (e.dataTransfer.files.length > 0) loadImage(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length > 0) loadImage(fileInput.files[0]); });

// Also handle drop on entire canvas area when image loaded
wrap.addEventListener('dragover', e => e.preventDefault());
wrap.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files.length > 0) {
    // Reset state for new image
    state.scale = null; state.scalePoints = []; state.rooms = [];
    state.currentPoly = []; state.selectedRoom = -1;
    loadImage(e.dataTransfer.files[0]);
  }
});

// --- Buttons ---
btnUpload.addEventListener('click', () => fileInput.click());
btnScale.addEventListener('click', () => {
  state.scalePoints = [];
  setMode('scale');
  render();
});
btnDraw.addEventListener('click', () => {
  if (!state.scale) {
    alert('請先設定比例尺');
    setMode('scale');
    return;
  }
  setMode('draw');
});
btnPan.addEventListener('click', () => setMode('pan'));
btnUndo.addEventListener('click', () => undo());
btnRedo.addEventListener('click', () => redo());
btnClearAll.addEventListener('click', () => {
  if (!confirm('確定要清除所有資料？')) return;
  undoStack = []; redoStack = [];
  state.scale = null; state.scalePoints = []; state.rooms = [];
  state.currentPoly = []; state.selectedRoom = -1;
  state.image = null; img = null;
  state.offsetX = 0; state.offsetY = 0; state.zoom = 1;
  dropzone.classList.remove('hidden');
  btnScale.disabled = true; btnDraw.disabled = true; btnPan.disabled = true; btnClearAll.disabled = true; btnExport.disabled = true;
  setMode('idle');
  instrEl.textContent = '拖曳或點擊上傳平面圖開始使用';
  updateRoomList();
  localStorage.removeItem('floorPlanState');
  render();
});

// Sidebar toggle for mobile
btnRoomList.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  sidebarOverlay.classList.toggle('show');
});
sidebarOverlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  sidebarOverlay.classList.remove('show');
});

// --- Scale modal ---
scaleCancelBtn.addEventListener('click', () => {
  scaleModal.classList.add('hidden');
  state.scalePoints = [];
  render();
});
scaleConfirmBtn.addEventListener('click', confirmScale);
scaleDistance.addEventListener('keydown', e => { if (e.key === 'Enter') confirmScale(); });

function confirmScale() {
  const val = parseFloat(scaleDistance.value);
  if (!val || val <= 0) { scaleDistance.focus(); return; }
  pushUndo();
  const unit = scaleUnit.value;
  const meters = unit === 'cm' ? val / 100 : val;
  const pixDist = dist(state.scalePoints[0], state.scalePoints[1]);
  state.scale = { pixelsPerMeter: pixDist / meters };
  scaleModal.classList.add('hidden');
  recalcAreas();
  updateRoomList();
  setMode('draw');
  saveState();
  render();
}

// --- Room name modal ---
roomCancelBtn.addEventListener('click', () => {
  roomModal.classList.add('hidden');
  // Restore the state from before closePoly was called
  if (undoStack.length > 0) {
    applySnapshot(undoStack.pop());
    updateUndoRedoButtons();
  }
  pendingPolyPoints = null;
  mouseDown = false; mouseDownPos = null; hasMoved = false; isPanning = false;
  render();
});
roomConfirmBtn.addEventListener('click', confirmRoom);
roomNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') confirmRoom(); });

function confirmRoom() {
  const name = roomNameInput.value.trim();
  roomNameInput.blur(); // Prevent iOS zoom on input focus
  roomModal.classList.add('hidden');
  finalizeRoom(name);
  // Reset touch/mouse state to prevent stuck interactions
  mouseDown = false;
  mouseDownPos = null;
  hasMoved = false;
  isPanning = false;
}

// --- Keyboard ---
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'Escape') {
    if (state.currentPoly.length > 0) {
      pushUndo();
      state.currentPoly = [];
      render();
    }
  }
  if (e.key === 'Enter' && state.mode === 'draw' && state.currentPoly.length >= 3) {
    closePoly();
  }
  if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    if (e.shiftKey) {
      redo();
    } else {
      undo();
    }
  }
});

// --- Export image ---
btnExport.addEventListener('click', exportImage);

function exportImage() {
  if (!img) return;
  // Create a high-res export canvas at original image size
  const expCanvas = document.createElement('canvas');
  const pad = 60; // padding for room list at bottom
  const roomCount = state.rooms.length;
  const listH = roomCount > 0 ? 40 + roomCount * 24 + 30 : 0;
  expCanvas.width = state.imageW;
  expCanvas.height = state.imageH + listH;
  const ec = expCanvas.getContext('2d');

  // Draw background
  ec.fillStyle = '#0a0a1a';
  ec.fillRect(0, 0, expCanvas.width, expCanvas.height);

  // Draw image
  ec.drawImage(img, 0, 0);

  // Draw rooms
  state.rooms.forEach((room, ri) => {
    const color = ROOM_COLORS[ri % ROOM_COLORS.length];
    const pts = room.points;
    if (pts.length < 3) return;

    // Fill
    ec.fillStyle = hexToRgba(color, 0.25);
    ec.beginPath();
    pts.forEach((p, i) => i === 0 ? ec.moveTo(p.x, p.y) : ec.lineTo(p.x, p.y));
    ec.closePath(); ec.fill();

    // Stroke
    ec.strokeStyle = color;
    ec.lineWidth = 3;
    ec.beginPath();
    pts.forEach((p, i) => i === 0 ? ec.moveTo(p.x, p.y) : ec.lineTo(p.x, p.y));
    ec.closePath(); ec.stroke();

    // Dots
    pts.forEach(p => {
      ec.fillStyle = color;
      ec.beginPath(); ec.arc(p.x, p.y, 5, 0, Math.PI * 2); ec.fill();
      ec.strokeStyle = '#fff'; ec.lineWidth = 1.5; ec.stroke();
    });

    // Edge distances
    if (state.scale) {
      ec.font = 'bold 14px sans-serif';
      ec.textAlign = 'center';
      for (let i = 0; i < pts.length; i++) {
        const j = (i + 1) % pts.length;
        const d = dist(pts[i], pts[j]) / state.scale.pixelsPerMeter;
        const mx = (pts[i].x + pts[j].x) / 2, my = (pts[i].y + pts[j].y) / 2;
        const text = d.toFixed(2) + 'm';
        const tw = ec.measureText(text).width;
        ec.fillStyle = 'rgba(0,0,0,0.75)';
        ec.fillRect(mx - tw/2 - 4, my - 18, tw + 8, 20);
        ec.fillStyle = color;
        ec.fillText(text, mx, my - 2);
      }
    }

    // Room label
    const c = polygonCentroid(pts);
    let label = room.name || '';
    if (state.scale) label += '\n' + room.areaM2.toFixed(2) + ' m²\n' + room.areaPing.toFixed(2) + ' 坪';
    const lines = label.split('\n');
    const lh = 20;
    let maxW = 0;
    ec.font = 'bold 16px sans-serif';
    lines.forEach(l => { maxW = Math.max(maxW, ec.measureText(l).width); });
    ec.fillStyle = 'rgba(0,0,0,0.8)';
    ec.fillRect(c.x - maxW/2 - 8, c.y - lines.length * lh/2 - 4, maxW + 16, lines.length * lh + 8);
    ec.fillStyle = '#fff';
    lines.forEach((l, i) => {
      ec.font = i === 0 ? 'bold 16px sans-serif' : '14px sans-serif';
      ec.textAlign = 'center';
      ec.fillText(l, c.x, c.y - lines.length * lh/2 + i * lh + 16);
    });
  });

  // Room list summary at bottom
  if (roomCount > 0) {
    const y0 = state.imageH + 16;
    ec.fillStyle = '#ffd700';
    ec.font = 'bold 18px sans-serif';
    ec.textAlign = 'left';
    ec.fillText('📋 房間面積總覽', 16, y0);

    let totalM2 = 0, totalPing = 0;
    state.rooms.forEach((room, i) => {
      const color = ROOM_COLORS[i % ROOM_COLORS.length];
      const ry = y0 + 24 + i * 24;
      ec.fillStyle = color;
      ec.fillRect(16, ry - 12, 12, 12);
      ec.fillStyle = '#e0e0e0';
      ec.font = '14px sans-serif';
      ec.fillText(`${room.name}：${room.areaM2.toFixed(2)} m²（${room.areaPing.toFixed(2)} 坪）`, 36, ry);
      totalM2 += room.areaM2;
      totalPing += room.areaPing;
    });
    const ty = y0 + 24 + roomCount * 24;
    ec.fillStyle = '#ffd700';
    ec.font = 'bold 15px sans-serif';
    ec.fillText(`合計：${totalM2.toFixed(2)} m²（${totalPing.toFixed(2)} 坪）`, 16, ty);
  }

  // Download
  const link = document.createElement('a');
  link.download = '坪數計算_' + new Date().toISOString().slice(0,10) + '.png';
  link.href = expCanvas.toDataURL('image/png');
  link.click();
}

// --- Prevent ALL double-tap zoom on iOS ---
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) { e.preventDefault(); }
  lastTouchEnd = now;
}, { passive: false });

// --- localStorage ---
function saveState() {
  try {
    const s = {
      image: state.image,
      imageW: state.imageW, imageH: state.imageH,
      scale: state.scale, scalePoints: state.scalePoints,
      rooms: state.rooms,
      offsetX: state.offsetX, offsetY: state.offsetY, zoom: state.zoom
    };
    localStorage.setItem('floorPlanState', JSON.stringify(s));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem('floorPlanState');
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.image) {
      state.image = s.image;
      state.imageW = s.imageW; state.imageH = s.imageH;
      state.scale = s.scale; state.scalePoints = s.scalePoints || [];
      state.rooms = s.rooms || [];
      state.offsetX = s.offsetX || 0; state.offsetY = s.offsetY || 0;
      state.zoom = s.zoom || 1;
      loadImageFromDataURL(s.image);
      updateRoomList();
    }
  } catch(e) {}
}

// --- Preview animation (only runs when needed) ---
let animRunning = false;
function animatePreview() {
  if (state.mode === 'draw' && state.cursorPos && img) {
    render();
    animRunning = true;
    requestAnimationFrame(animatePreview);
  } else {
    animRunning = false;
  }
}
function startAnimIfNeeded() {
  if (!animRunning && state.mode === 'draw' && state.cursorPos && img) {
    animRunning = true;
    requestAnimationFrame(animatePreview);
  }
}

// --- Init ---
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
loadState();

})();
</script>
