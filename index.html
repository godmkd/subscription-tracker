  health: { label: 'ŚĀ•Śļ∑', color: '#fb923c', icon: 'ūüí™' },
  insurance: { label: 'šŅĚťö™', color: '#e879f9', icon: 'ūüõ°ÔłŹ' },
  government: { label: 'Ť¶ŹŤ≤Ľ', color: '#94a3b8', icon: 'ūüŹõÔłŹ' },
  work: { label: 'Ś∑•šĹú', color: '#60a5fa', icon: 'ūüíľ' },
  life: { label: 'ÁĒüśīĽ', color: '#fbbf24', icon: 'ūüŹ†' },

};

const RATES = { TWD: 1, USD: 32, JPY: 0.22 };

let subs = [];
let members = [];
let filterCat = '';

let chartInstance = null;

// --- Auth ---
function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').style.display = 'none';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
}

async function doLogin() {
  document.getElementById('loginLoading').style.display = 'block';
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'custom:line',
    options: { redirectTo: window.location.origin + window.location.pathname, queryParams: { prompt: 'consent' } }
  });
  if (error) { alert('ÁôĽŚÖ•Ś§Īśēó: ' + error.message); document.getElementById('loginLoading').style.display = 'none'; }
}

async function doEmailLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMsg');
  if (!email || !password) { msg.style.display = 'block'; msg.style.color = '#f87171'; msg.textContent = 'ŤęčŤľłŚÖ•šŅ°ÁģĪŚíĆŚĮÜÁĘľ'; return; }
  if (password.length < 6) { msg.style.display = 'block'; msg.style.color = '#f87171'; msg.textContent = 'ŚĮÜÁĘľŤá≥ŚįĎ 6 ÁĘľ'; return; }

  document.getElementById('loginLoading').style.display = 'block';
  msg.style.display = 'none';

  // Try sign in first
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (!error && data.user) return; // onAuthStateChange handles the rest

  // If invalid credentials, try sign up
  if (error && (error.message.includes('Invalid') || error.message.includes('credentials'))) {
    const { data: signUpData, error: signUpErr } = await sb.auth.signUp({ email, password });
    if (signUpErr) {
      msg.style.display = 'block'; msg.style.color = '#f87171'; msg.textContent = 'Ť®ĽŚÜäŚ§Īśēó: ' + signUpErr.message;
      document.getElementById('loginLoading').style.display = 'none';
      return;
    }
    if (signUpData.user && !signUpData.session) {
      msg.style.display = 'block'; msg.style.color = '#34d399'; msg.textContent = 'Ś∑≤ŚĮĄŚáļť©óŤ≠ČšŅ°ÔľĆŤęčśü•śĒ∂ŚĺĆťáćśĖįÁôĽŚÖ•';
      document.getElementById('loginLoading').style.display = 'none';
      return;
    }
    return; // onAuthStateChange handles
  }

  msg.style.display = 'block'; msg.style.color = '#f87171'; msg.textContent = 'ÁôĽŚÖ•Ś§Īśēó: ' + (error?.message || 'śú™Áü•ťĆĮŤ™§');
  document.getElementById('loginLoading').style.display = 'none';
}

async function doLogout() {
  currentUser = null;
  showLogin();
  try { await sb.auth.signOut(); } catch(e) {}
}

function renderUserBar() {
  const name = currentUser?.user_metadata?.name || currentUser?.email || 'šĹŅÁĒ®ŤÄÖ';
  const avatar = currentUser?.user_metadata?.picture || currentUser?.user_metadata?.avatar_url || '';
  document.getElementById('userBar').innerHTML = `
    ${avatar ? `<img src="${avatar}" style="width:28px;height:28px;border-radius:50%">` : ''}
    <span class="user-name">${name}</span>
    <button class="btn-logout" onclick="doLogout()">ÁôĽŚáļ</button>
  `;
}

// --- Data persistence ---
// Strategy: use app_settings table (single JSON blob per user) as primary store
// This avoids delete+insert race conditions and works with existing Supabase project

async function load() {
  // Load from localStorage first (instant)
  try { subs = JSON.parse(localStorage.getItem('subscriptions') || '[]'); } catch(e) { subs = []; }
  try { members = JSON.parse(localStorage.getItem('sub_members') || '[]'); } catch(e) { members = []; }

  if (!currentUser) return;
  const uid = currentUser.id;
  const localSubs = [...subs];
  const localMembers = [...members];

  try {
    const settingsKey = 'sub_' + uid;
    const { data, error } = await sb.from('app_settings').select('value').eq('key', settingsKey).maybeSingle();
    if (error) { console.warn('app_settings query error:', error.message); return; }

    if (data?.value) {
      const cloud = data.value;
      if (cloud.subs && cloud.subs.length > 0) subs = cloud.subs;
      if (cloud.members) members = cloud.members;
      localStorage.setItem('subscriptions', JSON.stringify(subs));
      localStorage.setItem('sub_members', JSON.stringify(members));
    } else if (localSubs.length > 0) {
      console.log('Migrating localStorage to cloud...');
      await saveToCloud();
    }
  } catch(e) {
    console.warn('Cloud load failed, using localStorage', e);
  }
}

async function saveToCloud() {
  if (!currentUser) return;
  try {
    const settingsKey = 'sub_' + currentUser.id;
    const { error } = await sb.from('app_settings').upsert({
      key: settingsKey,
      value: { subs, members, updated: Date.now() }
    }, { onConflict: 'key' });
    if (error) console.warn('Cloud save error:', error.message);
  } catch(e) {
    console.warn('Cloud save failed:', e);
  }
}

async function save() {
  localStorage.setItem('subscriptions', JSON.stringify(subs));
  localStorage.setItem('sub_members', JSON.stringify(members));
  await saveToCloud();
}

function toMonthly(amount, cycle, currency) {
  const twd = amount * (RATES[currency] || 1);
  if (cycle === 'weekly') return twd * 4.33;
  if (cycle === 'quarterly') return twd / 3;
  if (cycle === 'yearly') return twd / 12;
  return twd;
}

function fmtMoney(n) { return 'NT$' + Math.round(n).toLocaleString(); }

function cycleLabel(c) {
  return { monthly: 'śĮŹśúą', quarterly: 'śĮŹŚ≠£', yearly: 'śĮŹŚĻī', weekly: 'śĮŹťÄĪ' }[c] || c;
}

// --- Member management ---
function addMember() {
  const name = prompt('ŤľłŚÖ•śąźŚď°ŚźćÁ®ĪÔľö');
  if (!name || !name.trim()) return;
  const trimmed = name.trim();
  if (members.includes(trimmed)) { alert('śąźŚď°Ś∑≤Ś≠ėŚú®'); return; }
  members.push(trimmed);
  save();
  render();
}

function removeMember(name) {
  if (!confirm(`ÁĘļŚģöÁßĽťô§„ÄĆ${name}„ÄćÔľüŤ©≤śąźŚď°ÁöĄŤ®āťĖĪśúÉŤģäśąźšłćśĆáŚģö`)) return;
  members = members.filter(m => m !== name);
  subs.forEach(s => { if (s.member === name) s.member = ''; });
  save();
  render();
}

function renderMemberBar() {
  const bar = document.getElementById('memberBar');
  let html = `<span class="member-chip ${filterMember===''?'active':''}" onclick="filterMember='';render()">ŚÖ®ťÉ®</span>`;
  members.forEach(m => {
    html += `<span class="member-chip ${filterMember===m?'active':''}" onclick="filterMember='${m}';render()">
      ${m}<span class="remove" onclick="event.stopPropagation();removeMember('${m}')">‚úē</span>
    </span>`;
  });
  html += `<button class="member-add" onclick="addMember()">Ôľč śĖįŚĘěśąźŚď°</button>`;
  bar.innerHTML = html;

  // Update member select in add form
  const sel = document.getElementById('addMember');
  const current = sel.value;
  sel.innerHTML = '<option value="">šłćśĆáŚģö</option>' + members.map(m => `<option value="${m}">${m}</option>`).join('');
  sel.value = current;
}

function renderMemberSummary(activeSubs) {
  const el = document.getElementById('memberSummary');
  if (members.length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'grid';

  const memberCosts = {};
  const memberCounts = {};
  members.forEach(m => { memberCosts[m] = 0; memberCounts[m] = 0; });
  memberCosts['śú™śĆáŚģö'] = 0;
  memberCounts['śú™śĆáŚģö'] = 0;

  activeSubs.forEach(s => {
    const m = s.member || 'śú™śĆáŚģö';
    const monthly = toMonthly(s.amount, s.cycle, s.currency);
    if (memberCosts[m] !== undefined) {
      memberCosts[m] += monthly;
      memberCounts[m]++;
    } else {
      memberCosts['śú™śĆáŚģö'] += monthly;
      memberCounts['śú™śĆáŚģö']++;
    }
  });

  const keys = [...members];
  if (memberCounts['śú™śĆáŚģö'] > 0) keys.push('śú™śĆáŚģö');

  el.innerHTML = keys.map(m => `
    <div class="member-card">
      <div class="name">ūüĎ§ ${m}</div>
      <div class="cost">${fmtMoney(memberCosts[m])}/śúą</div>
      <div class="count">${memberCounts[m]} ť†Ö</div>
    </div>
  `).join('');
}

// --- Subscriptions ---
function addSubscription() {
  const name = document.getElementById('addName').value.trim();
  const amount = parseFloat(document.getElementById('addAmount').value);
  const cycle = document.getElementById('addCycle').value;
  const category = document.getElementById('addCategory').value;
  const currency = document.getElementById('addCurrency').value;
  const member = document.getElementById('addMember').value;
  const day = parseInt(document.getElementById('addDay').value) || 1;

  if (!name || isNaN(amount)) { alert('ŤęčŤľłŚÖ•ŚźćÁ®ĪŚíĆťáĎť°ć'); return; }

  subs.push({ id: Date.now(), name, amount, cycle, category, currency, member, day, active: true });
  save();

  document.getElementById('addName').value = '';
  document.getElementById('addAmount').value = '';
  document.getElementById('addDay').value = '';
  document.getElementById('presetSelect').value = '';
  render();
}

function removeSub(id) {
  if (!confirm('ÁĘļŚģöŚą™ťô§Ôľü')) return;
  subs = subs.filter(s => s.id !== id);
  save();
  render();
}

function toggleSub(id) {
  const s = subs.find(x => x.id === id);
  if (s) s.active = !s.active;
  save();
  render();
}

function editSub(id) {
  const s = subs.find(x => x.id === id);
  if (!s) return;
  const name = prompt('ŚźćÁ®ĪÔľö', s.name);
  if (name === null) return;
  const amount = prompt('ťáĎť°ćÔľö', s.amount);
  if (amount === null) return;
  const memberOptions = ['ÔľąšłćśĆáŚģöÔľČ', ...members];
  const currentIdx = s.member ? memberOptions.indexOf(s.member) : 0;
  const memberInput = prompt(`śąźŚď°Ôľą${memberOptions.join('/')}ÔľČÔľö`, memberOptions[currentIdx] || 'ÔľąšłćśĆáŚģöÔľČ');
  if (memberInput === null) return;
  s.name = name.trim() || s.name;
  s.amount = parseFloat(amount) || s.amount;
  s.member = (memberInput === 'ÔľąšłćśĆáŚģöÔľČ' || !memberInput.trim()) ? '' : memberInput.trim();
  save();
  render();
}

function applyPreset() {
  const sel = document.getElementById('presetSelect');
  const val = sel.value;
  if (!val) return;
  const [name, amount, cycle, category, currency] = val.split('|');
  document.getElementById('addName').value = name;
  document.getElementById('addAmount').value = amount;
  document.getElementById('addCycle').value = cycle;
  document.getElementById('addCategory').value = category;
  document.getElementById('addCurrency').value = currency;
  // Focus amount if 0 (custom amount presets)
  if (amount === '0') {
    document.getElementById('addAmount').value = '';
    document.getElementById('addAmount').focus();
  }
  sel.value = '';
}

function render() {
  renderMemberBar();

  let activeSubs = subs.filter(s => s.active);
  const allActiveSubs = activeSubs;

  // Filter by member
  let displaySubs = subs;
  if (filterMember) {
    activeSubs = activeSubs.filter(s => s.member === filterMember);
    displaySubs = subs.filter(s => s.member === filterMember);
  }

  const totalMonthly = activeSubs.reduce((sum, s) => sum + toMonthly(s.amount, s.cycle, s.currency), 0);

  const memberLabel = filterMember ? ` (${filterMember})` : '';
  document.getElementById('totalMonthly').textContent = fmtMoney(totalMonthly) + '/śúą';
  document.getElementById('totalSub').textContent = `${activeSubs.length} ť†ÖŤ®āťĖĪ${memberLabel}ÔľąŚĻīŤ≤ĽÁīĄ ${fmtMoney(totalMonthly * 12)}ÔľČ`;

  // Summary cards
  const yearly = totalMonthly * 12;
  const daily = totalMonthly / 30;
  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="label">śĮŹśúą${memberLabel}</div><div class="value" style="color:#fbbf24">${fmtMoney(totalMonthly)}</div></div>
    <div class="card"><div class="label">śĮŹŚĻī${memberLabel}</div><div class="value" style="color:#f59e0b">${fmtMoney(yearly)}</div></div>
    <div class="card"><div class="label">śĮŹśó•${memberLabel}</div><div class="value" style="color:#fb923c">${fmtMoney(daily)}</div></div>
    <div class="card"><div class="label">Ť®āťĖĪśēł</div><div class="value">${displaySubs.length}</div><div class="label">(ŚēüÁĒ® ${activeSubs.length})</div></div>
  `;

  // Member summary (only when viewing all)
  if (!filterMember) renderMemberSummary(allActiveSubs);
  else document.getElementById('memberSummary').style.display = 'none';

  // Filter bar (category)
  const cats = [...new Set(displaySubs.map(s => s.category))];
  document.getElementById('filterBar').innerHTML =
    `<button class="filter-btn ${!filterCat ? 'active' : ''}" onclick="filterCat='';render()">ŚÖ®ťÉ®</button>` +
    cats.map(c => `<button class="filter-btn ${filterCat===c?'active':''}" onclick="filterCat='${c}';render()">${CATEGORIES[c]?.icon||''} ${CATEGORIES[c]?.label||c}</button>`).join('');

  // Subscription list
  let filtered = filterCat ? displaySubs.filter(s => s.category === filterCat) : displaySubs;
  const sorted = [...filtered].sort((a, b) => toMonthly(b.amount, b.cycle, b.currency) - toMonthly(a.amount, a.cycle, a.currency));

  if (sorted.length === 0) {
    document.getElementById('subList').innerHTML = '<div class="empty">ŚįöÁĄ°Ť®āťĖĪÔľĆťĽěšłäśĖĻ„ÄĆÔľč śĖįŚĘě„ÄćťĖčŚßčŤŅĹŤĻ§</div>';
  } else {
    document.getElementById('subList').innerHTML = sorted.map(s => {
      const cat = CATEGORIES[s.category] || CATEGORIES.other;
      const monthly = toMonthly(s.amount, s.cycle, s.currency);
      const opacity = s.active ? '1' : '0.4';
      const memberHtml = s.member ? `<span class="member-tag">ūüĎ§ ${s.member}</span>` : '';
      return `<div class="sub-item" style="opacity:${opacity};border-left:3px solid ${cat.color}">
        <div class="sub-icon">${cat.icon}</div>
        <div class="sub-info">
          <div class="sub-name">${s.name} <span class="cat-tag" style="background:${cat.color}20;color:${cat.color}">${cat.label}</span>${memberHtml}</div>
          <div class="sub-detail">${s.currency} ${s.amount.toLocaleString()} ${cycleLabel(s.cycle)} | śČ£ś¨ĺśó•Ôľö${s.day}śó• ${!s.active ? '‚Źł Ś∑≤śöęŚĀú' : ''}</div>
        </div>
        <div class="sub-price">
          <div class="sub-amount">${fmtMoney(monthly)}</div>
          <div class="sub-monthly">/śúą</div>
        </div>
        <div class="sub-actions">
          <button class="btn-edit" onclick="editSub(${s.id})">‚úŹÔłŹ</button>
          <button class="btn-danger" onclick="toggleSub(${s.id})">${s.active ? '‚Źł' : '‚Ė∂'}</button>
          <button class="btn-danger" onclick="removeSub(${s.id})">‚úē</button>
        </div>
      </div>`;
    }).join('');
  }

  // Pie chart
  renderPieChart(activeSubs);

  // Calendar
  renderCalendar(activeSubs);
}

function renderPieChart(activeSubs) {
  const catTotals = {};
  activeSubs.forEach(s => {
    const cat = s.category || 'other';
    catTotals[cat] = (catTotals[cat] || 0) + toMonthly(s.amount, s.cycle, s.currency);
  });

  const entries = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  if (chartInstance) chartInstance.destroy();
  if (entries.length === 0) return;

  const total = entries.reduce((s, e) => s + e[1], 0);
  chartInstance = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: entries.map(e => CATEGORIES[e[0]]?.label || e[0]),
      datasets: [{ data: entries.map(e => e[1]), backgroundColor: entries.map(e => CATEGORIES[e[0]]?.color || '#888'), borderWidth: 0 }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#aaa', font: { size: 11 }, padding: 8 } },
        tooltip: {
          callbacks: {
            label: c => `${c.label}: ${fmtMoney(c.raw)} (${(c.raw/total*100).toFixed(1)}%)`
          }
        }
      }
    }
  });
}

function renderCalendar(activeSubs) {
  const el = document.getElementById('calendarArea');
  const days = {};
  activeSubs.forEach(s => {
    const d = s.day || 1;
    if (!days[d]) days[d] = [];
    days[d].push(s);
  });

  if (Object.keys(days).length === 0) {
    el.innerHTML = '<div class="empty">ÁĄ°śČ£ś¨ĺśó•Ť≥áśĖô</div>';
    return;
  }

  const today = new Date().getDate();
  let html = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px">';
  for (let d = 1; d <= 31; d++) {
    const hasSubs = days[d];
    const isToday = d === today;
    const bg = hasSubs ? 'rgba(251,191,36,0.15)' : 'rgba(255,255,255,0.03)';
    const border = isToday ? '2px solid #fbbf24' : '1px solid rgba(255,255,255,0.06)';
    html += `<div style="background:${bg};border:${border};border-radius:6px;padding:6px;text-align:center;font-size:.78em;min-height:50px">
      <div style="font-weight:600;margin-bottom:2px;color:${isToday?'#fbbf24':'#888'}">${d}</div>
      ${hasSubs ? hasSubs.map(s => `<div style="font-size:.65em;color:${CATEGORIES[s.category]?.color||'#aaa'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${s.name}: ${s.currency}${s.amount}">${s.name}</div>`).join('') : ''}
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

// Init
let initDone = false;

async function enterApp(user) {
  currentUser = user;
  showApp();
  renderUserBar();
  await load();
  render();
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    initDone = true;
    await enterApp(session.user);
  } else {
    showLogin();
  }
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session?.user) {
    if (initDone) return; // Already handled by init()
    await enterApp(session.user);
  } else if (event === 'SIGNED_OUT') {
    initDone = false;
    currentUser = null;
    showLogin();
  }
});

init();
</script>
