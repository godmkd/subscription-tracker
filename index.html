<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月費統計器</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#0f0c29,#302b63);padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.header h1{font-size:1.3em;background:linear-gradient(90deg,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .total{font-size:2rem;font-weight:700;color:#fbbf24;margin-top:8px}
.header .sub{font-size:.85rem;color:#888;margin-top:4px}

.content{max-width:800px;margin:0 auto;padding:16px}

.summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;text-align:center}
.card .label{font-size:.72em;color:#888;margin-bottom:4px}
.card .value{font-size:1.1em;font-weight:700}

.member-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.member-chip{padding:5px 14px;border-radius:20px;font-size:.82em;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#aaa;transition:all .15s;position:relative}
.member-chip.active{background:rgba(167,139,250,0.2);color:#a78bfa;border-color:#a78bfa}
.member-chip .remove{display:none;position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#f87171;color:#fff;font-size:10px;line-height:16px;text-align:center;cursor:pointer}
.member-chip:hover .remove{display:block}
.member-add{padding:5px 12px;border-radius:20px;font-size:.82em;cursor:pointer;border:1px dashed rgba(255,255,255,0.3);background:transparent;color:#888;transition:all .15s}
.member-add:hover{border-color:#a78bfa;color:#a78bfa}

.add-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.add-bar input,.add-bar select{padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:.88em}
.add-bar input::placeholder{color:#666}
.add-bar input[type="number"]{width:90px}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:.88em;font-weight:600;cursor:pointer;transition:all .15s}
.btn-add{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000}
.btn-add:hover{transform:translateY(-1px)}
.btn-danger{background:transparent;border:1px solid #f87171;color:#f87171;padding:4px 10px;font-size:.75em;border-radius:6px;cursor:pointer}
.btn-danger:hover{background:#f87171;color:#fff}
.btn-edit{background:transparent;border:1px solid #67e8f9;color:#67e8f9;padding:4px 10px;font-size:.75em;border-radius:6px;cursor:pointer}
.btn-edit:hover{background:#67e8f9;color:#000}

.sub-list{margin-bottom:20px}
.sub-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;margin-bottom:8px;transition:all .2s}
.sub-item:hover{background:rgba(255,255,255,0.06)}
.sub-icon{font-size:1.5rem;width:40px;text-align:center}
.sub-info{flex:1}
.sub-name{font-weight:600;font-size:.95em}
.sub-detail{font-size:.78em;color:#888;margin-top:2px}
.sub-price{text-align:right}
.sub-amount{font-size:1.1em;font-weight:700;color:#fbbf24}
.sub-monthly{font-size:.72em;color:#888;margin-top:2px}
.sub-actions{display:flex;gap:4px}
.member-tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:.65em;background:rgba(167,139,250,0.2);color:#a78bfa;margin-left:4px}

.chart-area{max-width:350px;margin:0 auto 20px}
.section-title{font-size:.95em;color:#888;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.08)}

.cat-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7em;font-weight:600}

.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;background:rgba(255,255,255,0.06);color:#aaa;cursor:pointer;font-size:.8em}
.filter-btn.active{background:rgba(251,191,36,0.2);color:#fbbf24;border-color:#fbbf24}

.empty{text-align:center;color:#666;padding:40px;font-size:.9em}

.member-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px}
.member-card{background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:10px;padding:10px;text-align:center}
.member-card .name{font-size:.85em;color:#a78bfa;margin-bottom:4px}
.member-card .cost{font-size:1em;font-weight:700;color:#fbbf24}
.member-card .count{font-size:.7em;color:#888;margin-top:2px}

.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#0f0c29,#302b63);z-index:999}
.login-card{background:rgba(30,27,60,.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:48px 40px;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.5);max-width:420px;width:90%;color:#e2e8f0}

.btn-line{display:inline-flex;align-items:center;gap:10px;background:#06C755;color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;justify-content:center;transition:all .2s}
.btn-line:hover{background:#05b04c}
.login-divider{margin:20px 0 16px;position:relative;border-top:1px solid rgba(255,255,255,.15)}
.login-divider span{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:rgba(30,27,60,.85);padding:0 14px;font-size:.82rem;color:#888;white-space:nowrap}
.login-input{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,.15);border-radius:10px;margin-bottom:10px;font-size:.95rem;box-sizing:border-box;outline:none;background:rgba(255,255,255,.08);color:#fff;transition:border-color .2s}
.login-input:focus{border-color:#fbbf24}
.login-input::placeholder{color:#666}
.btn-email{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);color:#e0e0e0;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:12px 32px;font-size:.95rem;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:all .2s}
.btn-email:hover{background:rgba(255,255,255,.18)}
.login-msg{font-size:.82em;color:#34d399;margin-top:10px;display:none}
.login-loading{display:none;text-align:center;padding:20px;color:#aaa}
.app-page{display:none}
.user-bar{display:flex;align-items:center;gap:10px;justify-content:flex-end;padding:4px 0;margin-bottom:8px}

@media(max-width:600px){
  .add-bar{flex-direction:column}
  .add-bar input,.add-bar select{width:100%}

<script>
const SUPABASE_URL = 'https://kvnwfesbnxzoqpdgauov.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bndmZXNibnh6b3FwZGdhdW92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTAwMjIsImV4cCI6MjA5MDYyNjAyMn0.wpf9rUcPiaTUkDVhVgUaxBJ2rA4WaAMHG7tgSv9BOOQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

const CATEGORIES = {
  entertainment: { label: '娛樂', color: '#f59e0b', icon: '🎮' },
  tools: { label: '工具', color: '#3b82f6', icon: '🔧' },
  cloud: { label: '雲端', color: '#67e8f9', icon: '☁️' },
  music: { label: '音樂', color: '#a78bfa', icon: '🎵' },
  video: { label: '影音', color: '#f87171', icon: '🎬' },
  news: { label: '新聞', color: '#34d399', icon: '📰' },
  health: { label: '健康', color: '#fb923c', icon: '💪' },
  insurance: { label: '保險', color: '#e879f9', icon: '🛡️' },
  government: { label: '規費', color: '#94a3b8', icon: '🏛️' },
  work: { label: '工作', color: '#60a5fa', icon: '💼' },
  life: { label: '生活', color: '#fbbf24', icon: '🏠' },
  other: { label: '其他', color: '#9ca3af', icon: '📦' }
};

const RATES = { TWD: 1, USD: 32, JPY: 0.22 };

let subs = [];
let members = [];
let filterCat = '';
let filterMember = '';
let chartInstance = null;

// --- Auth ---
function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').style.display = 'none';
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
}

async function doLogin() {
  document.getElementById('loginLoading').style.display = 'block';
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'custom:line',
    options: { redirectTo: window.location.origin + window.location.pathname, queryParams: { prompt: 'consent' } }
  });
  if (error) { alert('登入失敗: ' + error.message); document.getElementById('loginLoading').style.display = 'none'; }
}

async function doEmailLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMsg');
  if (!email || !password) { msg.style.display = 'block'; msg.style.color = '#f87171'; msg.textContent = '請輸入信箱和密碼'; return; }
  if (password.length < 6) { msg.style.display = 'block'; msg.style.color = '#f87171'; msg.textContent = '密碼至少 6 碼'; return; }

  document.getElementById('loginLoading').style.display = 'block';
  msg.style.display = 'none';

  // Try sign in first
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (!error && data.user) return; // onAuthStateChange handles the rest

  // If invalid credentials, try sign up
  if (error && (error.message.includes('Invalid') || error.message.includes('credentials'))) {
    const { data: signUpData, error: signUpErr } = await sb.auth.signUp({ email, password });
    if (signUpErr) {
      msg.style.display = 'block'; msg.style.color = '#f87171'; msg.textContent = '註冊失敗: ' + signUpErr.message;
      document.getElementById('loginLoading').style.display = 'none';
      return;
    }
    if (signUpData.user && !signUpData.session) {
      msg.style.display = 'block'; msg.style.color = '#34d399'; msg.textContent = '已寄出驗證信，請查收後重新登入';
      document.getElementById('loginLoading').style.display = 'none';
      return;
    }
    return; // onAuthStateChange handles
  }

  msg.style.display = 'block'; msg.style.color = '#f87171'; msg.textContent = '登入失敗: ' + (error?.message || '未知錯誤');
  document.getElementById('loginLoading').style.display = 'none';
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  showLogin();
}

function renderUserBar() {
  const name = currentUser?.user_metadata?.name || currentUser?.email || '使用者';
  const avatar = currentUser?.user_metadata?.picture || currentUser?.user_metadata?.avatar_url || '';
  document.getElementById('userBar').innerHTML = `
    ${avatar ? `<img src="${avatar}" style="width:28px;height:28px;border-radius:50%">` : ''}
    <span class="user-name">${name}</span>
    <button class="btn-logout" onclick="doLogout()">登出</button>
  `;
}

// --- Data persistence (Supabase with localStorage fallback) ---
async function load() {
  // Load from localStorage first (fast)
  try { subs = JSON.parse(localStorage.getItem('subscriptions') || '[]'); } catch(e) { subs = []; }
  try { members = JSON.parse(localStorage.getItem('sub_members') || '[]'); } catch(e) { members = []; }

  if (!currentUser) return;
  const uid = currentUser.id;

  // Load from Supabase
  try {
    const { data: subData } = await sb.from('sub_subscriptions').select('*').eq('user_id', uid);
    if (subData && subData.length > 0) {
      subs = subData.map(r => ({
        id: r.id, name: r.name, amount: r.amount, cycle: r.cycle,
        category: r.category, currency: r.currency, member: r.member || '',
        day: r.billing_day, active: r.is_active
      }));
    }
    const { data: memData } = await sb.from('sub_members').select('name').eq('user_id', uid);
    if (memData) members = memData.map(m => m.name);

    // Sync to localStorage
    localStorage.setItem('subscriptions', JSON.stringify(subs));
    localStorage.setItem('sub_members', JSON.stringify(members));
  } catch(e) {
    console.warn('Supabase load failed, using localStorage', e);
  }
}

async function save() {
  localStorage.setItem('subscriptions', JSON.stringify(subs));
  localStorage.setItem('sub_members', JSON.stringify(members));

  if (!currentUser) return;
  const uid = currentUser.id;

  try {
    // Sync subscriptions: delete all then insert
    await sb.from('sub_subscriptions').delete().eq('user_id', uid);
    if (subs.length > 0) {
      await sb.from('sub_subscriptions').insert(subs.map(s => ({
        id: s.id, user_id: uid, name: s.name, amount: s.amount, cycle: s.cycle,
        category: s.category, currency: s.currency, member: s.member || null,
        billing_day: s.day, is_active: s.active
      })));
    }

    // Sync members
    await sb.from('sub_members').delete().eq('user_id', uid);
    if (members.length > 0) {
      await sb.from('sub_members').insert(members.map(m => ({ user_id: uid, name: m })));
    }
  } catch(e) {
    console.warn('Supabase save failed', e);
  }
}

function toMonthly(amount, cycle, currency) {
  const twd = amount * (RATES[currency] || 1);
  if (cycle === 'weekly') return twd * 4.33;
  if (cycle === 'quarterly') return twd / 3;
  if (cycle === 'yearly') return twd / 12;
  return twd;
}

function fmtMoney(n) { return 'NT$' + Math.round(n).toLocaleString(); }

function cycleLabel(c) {
  return { monthly: '每月', quarterly: '每季', yearly: '每年', weekly: '每週' }[c] || c;
}

// --- Member management ---
function addMember() {
  const name = prompt('輸入成員名稱：');
  if (!name || !name.trim()) return;
  const trimmed = name.trim();
  if (members.includes(trimmed)) { alert('成員已存在'); return; }
  members.push(trimmed);
  save();
  render();
}

function removeMember(name) {
  if (!confirm(`確定移除「${name}」？該成員的訂閱會變成不指定`)) return;
  members = members.filter(m => m !== name);
  subs.forEach(s => { if (s.member === name) s.member = ''; });
  save();
  render();
}

function renderMemberBar() {
  const bar = document.getElementById('memberBar');
  let html = `<span class="member-chip ${filterMember===''?'active':''}" onclick="filterMember='';render()">全部</span>`;
  members.forEach(m => {
    html += `<span class="member-chip ${filterMember===m?'active':''}" onclick="filterMember='${m}';render()">
      ${m}<span class="remove" onclick="event.stopPropagation();removeMember('${m}')">✕</span>
    </span>`;
  });
  html += `<button class="member-add" onclick="addMember()">＋ 新增成員</button>`;
  bar.innerHTML = html;

  // Update member select in add form
  const sel = document.getElementById('addMember');
  const current = sel.value;
  sel.innerHTML = '<option value="">不指定</option>' + members.map(m => `<option value="${m}">${m}</option>`).join('');
  sel.value = current;
}

function renderMemberSummary(activeSubs) {
  const el = document.getElementById('memberSummary');
  if (members.length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'grid';

  const memberCosts = {};
  const memberCounts = {};
  members.forEach(m => { memberCosts[m] = 0; memberCounts[m] = 0; });
  memberCosts['未指定'] = 0;
  memberCounts['未指定'] = 0;

  activeSubs.forEach(s => {
    const m = s.member || '未指定';
    const monthly = toMonthly(s.amount, s.cycle, s.currency);
    if (memberCosts[m] !== undefined) {
      memberCosts[m] += monthly;
      memberCounts[m]++;
    } else {
      memberCosts['未指定'] += monthly;
      memberCounts['未指定']++;
    }
  });

  const keys = [...members];
  if (memberCounts['未指定'] > 0) keys.push('未指定');

  el.innerHTML = keys.map(m => `
    <div class="member-card">
      <div class="name">👤 ${m}</div>
      <div class="cost">${fmtMoney(memberCosts[m])}/月</div>
      <div class="count">${memberCounts[m]} 項</div>
    </div>
  `).join('');
}

// --- Subscriptions ---
function addSubscription() {
  const name = document.getElementById('addName').value.trim();
  const amount = parseFloat(document.getElementById('addAmount').value);
  const cycle = document.getElementById('addCycle').value;
  const category = document.getElementById('addCategory').value;
  const currency = document.getElementById('addCurrency').value;
  const member = document.getElementById('addMember').value;
  const day = parseInt(document.getElementById('addDay').value) || 1;

  if (!name || isNaN(amount)) { alert('請輸入名稱和金額'); return; }

  subs.push({ id: Date.now(), name, amount, cycle, category, currency, member, day, active: true });
  save();

  document.getElementById('addName').value = '';
  document.getElementById('addAmount').value = '';
  document.getElementById('addDay').value = '';
  document.getElementById('presetSelect').value = '';
  render();
}

function removeSub(id) {
  if (!confirm('確定刪除？')) return;
  subs = subs.filter(s => s.id !== id);
  save();
  render();
}

function toggleSub(id) {
  const s = subs.find(x => x.id === id);
  if (s) s.active = !s.active;
  save();
  render();
}

function editSub(id) {
  const s = subs.find(x => x.id === id);
  if (!s) return;
  const name = prompt('名稱：', s.name);
  if (name === null) return;
  const amount = prompt('金額：', s.amount);
  if (amount === null) return;
  const memberOptions = ['（不指定）', ...members];
  const currentIdx = s.member ? memberOptions.indexOf(s.member) : 0;
  const memberInput = prompt(`成員（${memberOptions.join('/')}）：`, memberOptions[currentIdx] || '（不指定）');
  if (memberInput === null) return;
  s.name = name.trim() || s.name;
  s.amount = parseFloat(amount) || s.amount;
  s.member = (memberInput === '（不指定）' || !memberInput.trim()) ? '' : memberInput.trim();
  save();
  render();
}

function applyPreset() {
  const sel = document.getElementById('presetSelect');
  const val = sel.value;
  if (!val) return;
  const [name, amount, cycle, category, currency] = val.split('|');
  document.getElementById('addName').value = name;
  document.getElementById('addAmount').value = amount;
  document.getElementById('addCycle').value = cycle;
  document.getElementById('addCategory').value = category;
  document.getElementById('addCurrency').value = currency;
  // Focus amount if 0 (custom amount presets)
  if (amount === '0') {
    document.getElementById('addAmount').value = '';
    document.getElementById('addAmount').focus();
  }
  sel.value = '';
}

function render() {
  renderMemberBar();

  let activeSubs = subs.filter(s => s.active);
  const allActiveSubs = activeSubs;

  // Filter by member
  let displaySubs = subs;
  if (filterMember) {
    activeSubs = activeSubs.filter(s => s.member === filterMember);
    displaySubs = subs.filter(s => s.member === filterMember);
  }

  const totalMonthly = activeSubs.reduce((sum, s) => sum + toMonthly(s.amount, s.cycle, s.currency), 0);

  const memberLabel = filterMember ? ` (${filterMember})` : '';
  document.getElementById('totalMonthly').textContent = fmtMoney(totalMonthly) + '/月';
  document.getElementById('totalSub').textContent = `${activeSubs.length} 項訂閱${memberLabel}（年費約 ${fmtMoney(totalMonthly * 12)}）`;

  // Summary cards
  const yearly = totalMonthly * 12;
  const daily = totalMonthly / 30;
  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="label">每月${memberLabel}</div><div class="value" style="color:#fbbf24">${fmtMoney(totalMonthly)}</div></div>
    <div class="card"><div class="label">每年${memberLabel}</div><div class="value" style="color:#f59e0b">${fmtMoney(yearly)}</div></div>
    <div class="card"><div class="label">每日${memberLabel}</div><div class="value" style="color:#fb923c">${fmtMoney(daily)}</div></div>
    <div class="card"><div class="label">訂閱數</div><div class="value">${displaySubs.length}</div><div class="label">(啟用 ${activeSubs.length})</div></div>
  `;

  // Member summary (only when viewing all)
  if (!filterMember) renderMemberSummary(allActiveSubs);
  else document.getElementById('memberSummary').style.display = 'none';

  // Filter bar (category)
  const cats = [...new Set(displaySubs.map(s => s.category))];
  document.getElementById('filterBar').innerHTML =
    `<button class="filter-btn ${!filterCat ? 'active' : ''}" onclick="filterCat='';render()">全部</button>` +
    cats.map(c => `<button class="filter-btn ${filterCat===c?'active':''}" onclick="filterCat='${c}';render()">${CATEGORIES[c]?.icon||''} ${CATEGORIES[c]?.label||c}</button>`).join('');

  // Subscription list
  let filtered = filterCat ? displaySubs.filter(s => s.category === filterCat) : displaySubs;
  const sorted = [...filtered].sort((a, b) => toMonthly(b.amount, b.cycle, b.currency) - toMonthly(a.amount, a.cycle, a.currency));

  if (sorted.length === 0) {
    document.getElementById('subList').innerHTML = '<div class="empty">尚無訂閱，點上方「＋ 新增」開始追蹤</div>';
  } else {
    document.getElementById('subList').innerHTML = sorted.map(s => {
      const cat = CATEGORIES[s.category] || CATEGORIES.other;
      const monthly = toMonthly(s.amount, s.cycle, s.currency);
      const opacity = s.active ? '1' : '0.4';
      const memberHtml = s.member ? `<span class="member-tag">👤 ${s.member}</span>` : '';
      return `<div class="sub-item" style="opacity:${opacity};border-left:3px solid ${cat.color}">
        <div class="sub-icon">${cat.icon}</div>
        <div class="sub-info">
          <div class="sub-name">${s.name} <span class="cat-tag" style="background:${cat.color}20;color:${cat.color}">${cat.label}</span>${memberHtml}</div>
          <div class="sub-detail">${s.currency} ${s.amount.toLocaleString()} ${cycleLabel(s.cycle)} | 扣款日：${s.day}日 ${!s.active ? '⏸ 已暫停' : ''}</div>
        </div>
        <div class="sub-price">
          <div class="sub-amount">${fmtMoney(monthly)}</div>
          <div class="sub-monthly">/月</div>
        </div>
        <div class="sub-actions">
          <button class="btn-edit" onclick="editSub(${s.id})">✏️</button>
          <button class="btn-danger" onclick="toggleSub(${s.id})">${s.active ? '⏸' : '▶'}</button>
          <button class="btn-danger" onclick="removeSub(${s.id})">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  // Pie chart
  renderPieChart(activeSubs);

  // Calendar
  renderCalendar(activeSubs);
}

function renderPieChart(activeSubs) {
  const catTotals = {};
  activeSubs.forEach(s => {
    const cat = s.category || 'other';
    catTotals[cat] = (catTotals[cat] || 0) + toMonthly(s.amount, s.cycle, s.currency);
  });

  const entries = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  if (chartInstance) chartInstance.destroy();
  if (entries.length === 0) return;

  const total = entries.reduce((s, e) => s + e[1], 0);
  chartInstance = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: entries.map(e => CATEGORIES[e[0]]?.label || e[0]),
      datasets: [{ data: entries.map(e => e[1]), backgroundColor: entries.map(e => CATEGORIES[e[0]]?.color || '#888'), borderWidth: 0 }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#aaa', font: { size: 11 }, padding: 8 } },
        tooltip: {
          callbacks: {
            label: c => `${c.label}: ${fmtMoney(c.raw)} (${(c.raw/total*100).toFixed(1)}%)`
          }
        }
      }
    }
  });
}

function renderCalendar(activeSubs) {
  const el = document.getElementById('calendarArea');
  const days = {};
  activeSubs.forEach(s => {
    const d = s.day || 1;
    if (!days[d]) days[d] = [];
    days[d].push(s);
  });

  if (Object.keys(days).length === 0) {
    el.innerHTML = '<div class="empty">無扣款日資料</div>';
    return;
  }

  const today = new Date().getDate();
  let html = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px">';
  for (let d = 1; d <= 31; d++) {
    const hasSubs = days[d];
    const isToday = d === today;
    const bg = hasSubs ? 'rgba(251,191,36,0.15)' : 'rgba(255,255,255,0.03)';
    const border = isToday ? '2px solid #fbbf24' : '1px solid rgba(255,255,255,0.06)';
    html += `<div style="background:${bg};border:${border};border-radius:6px;padding:6px;text-align:center;font-size:.78em;min-height:50px">
      <div style="font-weight:600;margin-bottom:2px;color:${isToday?'#fbbf24':'#888'}">${d}</div>
      ${hasSubs ? hasSubs.map(s => `<div style="font-size:.65em;color:${CATEGORIES[s.category]?.color||'#aaa'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${s.name}: ${s.currency}${s.amount}">${s.name}</div>`).join('') : ''}
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

// Init
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    showApp();
    renderUserBar();
    await load();
    render();
  } else {
    showLogin();
  }
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session?.user) {
    currentUser = session.user;
    showApp();
    renderUserBar();
    await load();
    render();
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    showLogin();
  }
});

init();
</script>
